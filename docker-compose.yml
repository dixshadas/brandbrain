# Local dependencies only. The app + worker run on the host (uvicorn / arq) for fast reloads,
# or add them here for a full container run.
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: brandbrain
      POSTGRES_PASSWORD: brandbrain
      POSTGRES_DB: brandbrain
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U brandbrain"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]   # durable stream log
    ports: ["6379:6379"]
    volumes: ["redisdata:/data"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports: ["9000:9000", "9001:9001"]
    volumes: ["miniodata:/data"]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    ports: ["4317:4317"]

volumes:
  pgdata: {}
  redisdata: {}
  miniodata: {}
