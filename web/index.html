};
// Deterministic per-(asset,persona,dimension) score — grounded in the persona's overall
// relevance, the asset's dimension bias, and the persona's matching radar axis. No RNG.
function assetDimScore(assetId, persona, dim){
  const base = TEST_ASSETS.find(a=>a.id===assetId).scores[persona.id].pct;
  const bias = (ASSET_BIAS[assetId]||{})[dim.k] || 0;
  const axisV = dim.axis ? (PERSONA_DEPTH[persona.id].radar[dim.axis]||60) : 60;
  const axisAdj = (axisV-60)/4;                        // stronger axis → higher dim score
  const h = (assetId.charCodeAt(1)*7 + persona.id.charCodeAt(1)*13 + dim.k.length*5) % 9 - 4; // stable jitter −4..4
  return Math.max(18, Math.min(99, Math.round(base + bias + axisAdj + h)));
}

  RECOMMENDATION:{ label:"Recommendation",desc:"What the AI advises — you decide", fg:"text-ink",        bg:"bg-slate-100",  ring:"ring-slate-200",   bar:"bg-slate-800" },
};
const CONF = {
  high:     { label:"High confidence",     dots:3, fg:"text-emerald-700", bg:"bg-emerald-50", dot:"bg-emerald-600" },
  moderate: { label:"Moderate confidence", dots:2, fg:"text-amber-700",   bg:"bg-amber-50",   dot:"bg-amber-500" },
  low:      { label:"Low confidence",      dots:1, fg:"text-rose-600",    bg:"bg-rose-50",    dot:"bg-rose-600" },
};
const cx = (...a) => a.filter(Boolean).join(" ");

/* ------------------------------------------------------------------ PRIMITIVES */
function Button({children, onClick, variant="primary", size="md", icon, iconRight, disabled, className}) {
  const base="inline-flex items-center gap-2 font-semibold rounded-xl transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap";
  const sizes={ sm:"text-[13px] px-3 py-1.5", md:"text-sm px-4 py-2.5", lg:"text-[15px] px-5 py-3" };
  const variants={
    primary:"bg-indigo-600 text-white shadow-card hover:bg-indigo-700 hover:shadow-lift active:translate-y-px",
    soft:"bg-indigo-50 text-indigo-700 hover:bg-indigo-100",
    ghost:"text-ink-soft hover:bg-slate-100",
    outline:"border border-line text-ink-soft bg-white hover:bg-slate-50 hover:border-slate-300",
    emerald:"bg-emerald-600 text-white shadow-card hover:bg-emerald-700 hover:shadow-lift active:translate-y-px",
    danger:"border border-rose-200 text-rose-600 bg-white hover:bg-rose-50",
  };
  return <button onClick={onClick} disabled={disabled} className={cx(base,sizes[size],variants[variant],className)}>
    {icon && <span className="-ml-0.5">{icon}</span>}{children}{iconRight && <span className="-mr-0.5">{iconRight}</span>}
  </button>;
}

function LayerBadge({layer, size="sm"}) {
  const L=LAYER[layer]; if(!L) return null;
  return <span className={cx("inline-flex items-center gap-1.5 rounded-md font-bold tracking-wide uppercase ring-1",
    L.fg, L.bg, L.ring, size==="xs"?"text-[9.5px] px-1.5 py-0.5":"text-[10px] px-2 py-0.5")}>
    <span className={cx("w-1.5 h-1.5 rounded-full", L.bar)}></span>{L.label}
  </span>;
}

// Confidence is never a magic number. Hover/click reveals exactly what earned the score.
function ConfidenceBadge({level, why, align="left"}) {
  const C=CONF[level]; const [open,setOpen]=useState(false);
  const points = why && why.points ? why.points : null;
  const legacy = typeof why === "string" ? why : null;
  return <span className="relative inline-flex" onMouseEnter={()=>setOpen(true)} onMouseLeave={()=>setOpen(false)}>
    <button onClick={()=>setOpen(o=>!o)}
      className={cx("inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-bold transition", C.fg, C.bg)}>
      <span className="flex gap-0.5">{[0,1,2].map(i=><span key={i} className={cx("w-1.5 h-1.5 rounded-full", i<C.dots?C.dot:"bg-slate-300")}/>)}</span>
      {C.label}
    </button>
    {open && (points||legacy) && <div className={cx("absolute z-40 bottom-full mb-2 w-[300px] rounded-2xl bg-ink text-white shadow-pop animate-fadein overflow-hidden", align==="right"?"right-0":"left-0")}>
      <div className="px-4 pt-3.5 pb-2.5 flex items-center gap-2 border-b border-white/10">
        <span className="flex gap-0.5">{[0,1,2].map(i=><span key={i} className={cx("w-2 h-2 rounded-full", i<C.dots?C.dot:"bg-white/20")}/>)}</span>
        <span className="font-bold text-[13px]">{C.label}</span>
      </div>
      {points ? <div className="px-4 py-3">
        <div className="text-[9.5px] font-bold uppercase tracking-wider text-white/45 mb-2">
          {level==="low"?"Based on":"Supported by"}</div>
        <div className="space-y-1.5">
          {points.map((p,i)=><div key={i} className="flex items-start gap-2 text-[12.5px] leading-snug">
            <span className={cx("mt-0.5 shrink-0", p.ok?"text-emerald-400":"text-amber-400")}>
              {p.ok? <Icon.check size={13}/> : <Icon.gap size={13}/>}</span>
            <span className={p.ok?"text-white/90":"text-white/60"}>{p.text}</span>
          </div>)}
        </div>
      </div> : <div className="px-4 py-3 text-[12.5px] leading-relaxed text-white/85">{legacy}</div>}
      <div className={cx("absolute -bottom-1 w-2.5 h-2.5 bg-ink rotate-45", align==="right"?"right-6":"left-6")}/>
    </div>}
  </span>;
}

function CitationChip({id}) {
  const c=CITATIONS[id]; const src=useSource(); if(!c) return null;
  return <button onClick={()=>src.open(id)}
    className="group inline-flex items-center gap-1 align-middle rounded-md bg-white border border-line px-1.5 py-0.5 text-[11px] font-semibold text-ink-mute hover:text-indigo-700 hover:border-indigo-200 hover:bg-indigo-50 transition">
    <span className="text-indigo-500 group-hover:text-indigo-700"><Icon.quote size={11}/></span>{c.label}
  </button>;
}
function Cites({ids}) { return <span className="inline-flex flex-wrap gap-1 items-center align-middle">{ids.map(id=><CitationChip key={id} id={id}/>)}</span>; }

function Card({children, className, pad="p-5"}) {
  return <div className={cx("bg-white rounded-2xl border border-line shadow-card", pad, className)}>{children}</div>;
}
function Tag({children, tone="slate"}) {
  const t={ slate:"bg-slate-100 text-ink-soft", indigo:"bg-indigo-50 text-indigo-700", emerald:"bg-emerald-50 text-emerald-700",
            amber:"bg-amber-50 text-amber-700", rose:"bg-rose-50 text-rose-600" }[tone];
  return <span className={cx("inline-flex items-center gap-1 rounded-md px-2 py-0.5 text-[11px] font-semibold", t)}>{children}</span>;
}

    <div className="mt-3 space-y-2.5">

function AskScreen({app}) {
  const S=app; // phases: 'idle' | 'retrieving' | 'thinking' | 'done'
  const [q,setQ]=useState("");
  const [phase,setPhase]=useState(S.synthDone?"done":"idle");
  const [step,setStep]=useState(0);
  const [foundN,setFoundN]=useState(0);

  useEffect(()=>{ if(S.synthDone) setPhase("done"); },[S.synthDone]);

  const run=useCallback((question)=>{
    setQ(question); setPhase("retrieving"); setStep(0); setFoundN(0);
    let n=0; const ri=setInterval(()=>{ n++; setFoundN(n); if(n>=SYNTHESIS.sourcesUsed.length) clearInterval(ri); }, 260);
    setTimeout(()=>{ setPhase("thinking");
      let i=0; const ti=setInterval(()=>{ i++; setStep(i); if(i>=SYNTHESIS.thinkSteps.length){ clearInterval(ti);
        setTimeout(()=>{ setPhase("done"); S.setSynthDone(true);
          S.log("Asked “"+question+"” — synthesized from 5 sources with 1 contradiction preserved", ["c1","c4","c5"], "high", "Answered", "indigo");
        }, 520);
      }}, 620);
    }, 1500);
  },[S]);

  // IDLE — calm centered prompt
  if(phase==="idle") return <div className="h-full flex flex-col items-center justify-center px-6 -mt-10">
    <div className="w-full max-w-2xl text-center animate-fadeup">
      <div className="inline-flex items-center gap-2 text-[12px] font-semibold text-ink-mute bg-white border border-line rounded-full px-3 py-1.5 shadow-card mb-6">
        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"/> {DOCUMENTS.length} sources · governed · ready
      </div>
      <h1 className="text-[30px] font-extrabold tracking-[-.03em] text-ink">Ask your brand's memory.</h1>
      <p className="text-[15px] text-ink-mute mt-3 max-w-lg mx-auto leading-relaxed">
        A strategic question, answered from everything {BRAND.name} has ever learned — with every claim labeled, scored, and traceable to its source.</p>
      <div className="mt-8 relative">
        <div className="flex items-center gap-3 bg-white border border-line rounded-2xl shadow-lift px-4 py-3.5 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-50 transition">
          <span className="text-ink-faint"><Icon.search size={20}/></span>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim())run(q);}}
            placeholder="Ask a strategic question…" className="flex-1 bg-transparent outline-none text-[16px] text-ink placeholder:text-ink-faint"/>
          <Button size="sm" disabled={!q.trim()} onClick={()=>q.trim()&&run(q)} icon={<Icon.send size={15}/>}>Ask</Button>
        </div>
      </div>
      <div className="mt-6 flex flex-col items-center gap-2">
        <div className="text-[11px] font-semibold uppercase tracking-wider text-ink-faint">Try</div>
        <button onClick={()=>run(HERO_QUESTION)}
          className="group text-left max-w-xl w-full rounded-xl border border-line bg-white hover:border-indigo-200 hover:bg-indigo-50/40 hover:shadow-card px-4 py-3 transition flex items-center gap-3">

// Animated number — used for the confidence lift, so the jump is felt, not just read.
function CountUp({from, to, dur=1100, suffix="%"}) {
  const [v,setV]=useState(from); const raf=useRef(null);
  useEffect(()=>{ const t0=performance.now();
    const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); const eased=1-Math.pow(1-p,3);
      setV(Math.round(from+(to-from)*eased)); if(p<1) raf.current=requestAnimationFrame(tick); };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current);
  },[from,to,dur]);
  return <span>{v}{suffix}</span>;
}

/* --------------------------------------------- SEMANTIC KNOWLEDGE GRAPH (the signature visual) */
const gpos = (n) => {
  if(n.ring===0) return {x:550, y:330};
  const R = n.ring===1?165 : n.ring===2?272 : 362;
  const rad = n.a*Math.PI/180;
  return { x: 550 + Math.cos(rad)*R*1.30, y: 330 + Math.sin(rad)*R*0.80 };
};
const EDGE_TONE = { default:"#C3CAD9", amber:"#F59E0B", rose:"#F43F5E", emerald:"#10B981" };

function KnowledgeGraph({app, onSelect}) {
  const published = app.published;
  const nodes = useMemo(()=> published ? [...GRAPH_NODES, ...GRAPH_NEW_NODES] : GRAPH_NODES, [published]);
  const edges = useMemo(()=> published ? [...GRAPH_EDGES, ...GRAPH_NEW_EDGES] : GRAPH_EDGES, [published]);
  const [hover,setHover]=useState(null);
  const pos = useMemo(()=>{ const m={}; nodes.forEach(n=>m[n.id]=gpos(n)); return m; },[nodes]);
  const nbrs = useMemo(()=>{ const m={}; edges.forEach(e=>{ (m[e.from]=m[e.from]||new Set()).add(e.to); (m[e.to]=m[e.to]||new Set()).add(e.from); }); return m; },[edges]);
  const nodeDim = (id)=> hover && id!==hover && !(nbrs[hover]&&nbrs[hover].has(id));
  const edgeOn = (e)=> hover && (e.from===hover || e.to===hover);
  const isNew = (id)=> published && GRAPH_NEW_NODES.some(n=>n.id===id);
  const hovered = hover && nodes.find(n=>n.id===hover);

  return <div className="relative rounded-2xl border border-line bg-white shadow-card overflow-hidden">
    {/* header strip */}
    <div className="absolute top-0 left-0 right-0 z-10 px-5 py-3 flex items-center gap-3 pointer-events-none">
      <span className="text-[11px] font-bold uppercase tracking-wider text-ink-faint">Semantic knowledge graph</span>
      <span className="text-[11px] text-ink-faint">·</span>
      <span className="text-[11px] font-semibold text-ink-mute">{nodes.length} nodes · {edges.length} relationships</span>
      {published && <span className="text-[10px] font-bold text-emerald-700 bg-emerald-50 rounded px-1.5 py-0.5 flex items-center gap-1 pointer-events-none"><span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"/>+2 today</span>}
      <span className="ml-auto text-[11px] text-ink-faint pointer-events-none">hover to trace · click to inspect</span>
    </div>

    <svg viewBox="0 0 1100 660" className="w-full" style={{background:"radial-gradient(700px 420px at 50% 50%, #F6F8FE 0%, #FBFCFE 70%)"}}>
      <defs>
        <radialGradient id="brandGrad" cx="35%" cy="30%">
          <stop offset="0%" stopColor="#818CF8"/><stop offset="100%" stopColor="#4338CA"/>
        </radialGradient>
      </defs>
      {/* edges */}
      {edges.map((e,i)=>{ const a=pos[e.from], b=pos[e.to]; if(!a||!b) return null;
        const on=edgeOn(e); const tone=EDGE_TONE[e.tone||"default"];
        const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
        const isNewE = published && GRAPH_NEW_EDGES.includes(e);
        return <g key={i} className={cx("gedge", hover&&!on&&"dim", isNewE&&"edgedraw")}>
          <line x1={a.x} y1={a.y} x2={b.x} y2={b.y} stroke={on?"#6366F1":tone} strokeWidth={on?2:1.2}
            className={cx(!on&&"edgeflow")} opacity={on?1:.55}/>
          {on && (()=>{ const w=e.label.length*5.6+18; return <g>
            <rect x={mx-w/2} y={my-9} width={w} height="18" rx="9" fill="#0F172A" opacity=".92"/>
            <text x={mx} y={my+3.5} textAnchor="middle" fill="#fff" fontSize="9.5" fontWeight="700" fontFamily="Inter">{e.label}</text>
          </g>;})()}
        </g>;})}
      {/* nodes */}
      {nodes.map(n=>{ const p=pos[n.id]; const T=GTYPE[n.type]; const center=n.ring===0;
        const r = center?40 : n.ring===1?16 : 11;
        return <g key={n.id} className={cx("gnode", nodeDim(n.id)&&"dim", isNew(n.id)&&"nodepop")}
          onMouseEnter={()=>setHover(n.id)} onMouseLeave={()=>setHover(null)} onClick={()=>onSelect(n.id)}>
          {center && <circle cx={p.x} cy={p.y} r={58} fill="#6366F1" opacity=".14" className="ghalo"/>}
          {isNew(n.id) && <circle cx={p.x} cy={p.y} r={r+9} fill="none" stroke="#10B981" strokeWidth="2" opacity=".5" className="ghalo"/>}
          {hover===n.id && !center && <circle cx={p.x} cy={p.y} r={r+7} fill={T.color} opacity=".14"/>}
          <circle cx={p.x} cy={p.y} r={r} fill={center?"url(#brandGrad)":"#fff"} stroke={T.color} strokeWidth={center?0:2.2}/>
          {!center && <circle cx={p.x} cy={p.y} r={Math.max(3.2, r-6.5)} fill={T.color} opacity=".85"/>}
          {center && <text x={p.x} y={p.y+6} textAnchor="middle" fill="#fff" fontSize="17" fontWeight="800" fontFamily="Inter" letterSpacing="-0.5">YI</text>}
          <text x={p.x} y={p.y+r+15} textAnchor="middle" fill="#0F172A" fontSize={center?13:10.5} fontWeight="700" fontFamily="Inter">{n.label}</text>
          <text x={p.x} y={p.y+r+27} textAnchor="middle" fill="#94A3B8" fontSize="9" fontWeight="500" fontFamily="Inter">{n.sub}</text>
        </g>;})}
    </svg>

    {/* hover hint */}
    {hovered && hovered.ring!==0 && <div className="absolute bottom-14 left-1/2 -translate-x-1/2 z-10 pointer-events-none animate-fadein">
      <div className="bg-ink text-white rounded-xl shadow-pop px-4 py-2 text-[12px] font-medium flex items-center gap-2">
        <span className="w-2 h-2 rounded-full" style={{background:GTYPE[hovered.type].color}}/>
        {hovered.label} — click to inspect evidence
      </div>
    </div>}

    {/* legend */}
    <div className="border-t border-line bg-slate-50/60 px-5 py-2.5 flex items-center gap-x-4 gap-y-1 flex-wrap">
      {["brand","study","guideline","research","segment","claim","asset","competitor","sales","insight","recommendation","gap"].map(t=>
        <span key={t} className="inline-flex items-center gap-1.5 text-[10.5px] font-semibold text-ink-mute">
          <span className="w-2 h-2 rounded-full" style={{background:GTYPE[t].color}}/>{GTYPE[t].label}</span>)}
    </div>
  </div>;
}

const PTONE = { fuchsia:"#D946EF", violet:"#8B5CF6", purple:"#A855F7", pink:"#EC4899", slate:"#64748B" };
const dimTone = (b)=> b==="green"?{fg:"text-emerald-700",bg:"bg-emerald-100",solid:"#059669"}:b==="yellow"?{fg:"text-amber-700",bg:"bg-amber-100",solid:"#D97706"}:{fg:"text-rose-600",bg:"bg-rose-100",solid:"#E11D48"};

// Behaviour radar — a compact polar chart of a persona's behavioural axes.
const RADAR_SHORT = { "Innovation":"Innovation", "Evidence orientation":"Evidence", "Brand loyalty":"Loyalty", "Digital fluency":"Digital", "Risk tolerance":"Risk", "Commercial influence":"Influence" };
function BehaviourRadar({data, color="#4F46E5", size=200}) {
  const axes=Object.keys(data); const n=axes.length; const cx0=size/2, cy0=size/2, R=size/2-24;
  const pad=54; // horizontal room for labels
  const pt=(i,val)=>{ const ang=-Math.PI/2 + i*2*Math.PI/n; const r=R*val/100;
    return [cx0+Math.cos(ang)*r, cy0+Math.sin(ang)*r]; };
  const ring=(val)=>axes.map((_,i)=>pt(i,val).join(",")).join(" ");
  const poly=axes.map((a,i)=>pt(i,data[a]).join(",")).join(" ");
  return <svg width={size+pad*2} height={size+16} viewBox={`${-pad} -8 ${size+pad*2} ${size+16}`} className="mx-auto max-w-full">
    {[25,50,75,100].map(v=><polygon key={v} points={ring(v)} fill="none" stroke="#E7EAF0" strokeWidth="1"/>)}
    {axes.map((a,i)=>{ const [x,y]=pt(i,100); return <line key={i} x1={cx0} y1={cy0} x2={x} y2={y} stroke="#EEF0F5" strokeWidth="1"/>;})}
    <polygon points={poly} fill={color+"26"} stroke={color} strokeWidth="2"/>
    {axes.map((a,i)=>{ const [x,y]=pt(i,data[a]); return <circle key={i} cx={x} cy={y} r="2.6" fill={color}/>;})}
    {axes.map((a,i)=>{ const [x,y]=pt(i,112); const anchor=Math.abs(x-cx0)<6?"middle":x>cx0?"start":"end";
      return <g key={i}>
        <text x={x} y={y+2} textAnchor={anchor} fontSize="9" fontWeight="700" fill="#334155" fontFamily="Inter">{RADAR_SHORT[a]||a}</text>
        <text x={x} y={y+12} textAnchor={anchor} fontSize="8.5" fontWeight="700" fill={color} fontFamily="Inter">{data[a]}</text>
      </g>;})}
  </svg>;
}

// Decision Readiness dial — a small ring showing the overall readiness score + band.
function ReadinessDial({value, size=44}) {
  const B=READY_BAND(value); const r=(size-6)/2; const c=2*Math.PI*r; const off=c*(1-value/100);
  const stroke = value>=80?"#059669":value>=65?"#D97706":"#E11D48";
  return <div className="relative shrink-0" style={{width:size,height:size}}>
    <svg width={size} height={size} className="-rotate-90">
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#EEF0F5" strokeWidth="4"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={stroke} strokeWidth="4" strokeLinecap="round" strokeDasharray={c} strokeDashoffset={off}/>
    </svg>
    <div className="absolute inset-0 grid place-items-center"><span className={cx("text-[12px] font-extrabold", B.fg)}>{value}</span></div>
  </div>;
}

function RequestDemoModal({onClose, toast}) {
  const [f,setF]=useState({ first:"", last:"", email:"", company:"", role:"", phone:"", useCase:"" });
  const [err,setErr]=useState({});
  const [state,setState]=useState("form"); // form | sending | done
  const firstRef=useRef(null);
  useEffect(()=>{ if(firstRef.current) firstRef.current.focus();
    const onKey=(e)=>{ if(e.key==="Escape") onClose(); };
    document.addEventListener("keydown",onKey); return ()=>document.removeEventListener("keydown",onKey); },[onClose]);
  const set=(k,v)=>{ setF(s=>({...s,[k]:v})); if(err[k]) setErr(e=>({...e,[k]:null})); };
  const validate=()=>{ const e={};
    if(!f.first.trim()) e.first="Required";
    if(!f.last.trim()) e.last="Required";
    if(!f.email.trim()) e.email="Required"; else if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(f.email)) e.email="Enter a valid work email";
    if(!f.company.trim()) e.company="Required";
    if(!f.role) e.role="Required";
    setErr(e); return Object.keys(e).length===0; };
  const submit=(ev)=>{ ev.preventDefault(); if(!validate()) return; setState("sending");
    const payload={ ...f, submittedAt:new Date().toISOString(), source:"brainlee-landing" };
    // Persist a local copy so nothing is lost even without a backend.
    try{ const all=JSON.parse(localStorage.getItem("brainlee_demo_requests")||"[]"); all.push(payload);
      localStorage.setItem("brainlee_demo_requests", JSON.stringify(all)); }catch(_){}
    const endpoint = (typeof window!=="undefined" && window.__DEMO_ENDPOINT) || "";
    const finish=()=>{ setState("done"); toast && toast("Demo request received — we'll be in touch shortly"); };
    if(endpoint){ // POST to a Google Apps Script Web App → appends a row to the Sheet
      fetch(endpoint,{ method:"POST", mode:"no-cors", headers:{"Content-Type":"text/plain;charset=utf-8"}, body:JSON.stringify(payload) })
        .then(finish).catch(finish); setTimeout(finish, 1400);
    } else { setTimeout(finish, 900); }
  };
  const Field=({label, k, type="text", req, ph, full})=>(
    <div className={full?"sm:col-span-2":""}>
      <label htmlFor={"df-"+k} className="block text-[11px] font-bold uppercase tracking-wider text-ink-faint mb-1">{label}{req && <span className="text-rose-500"> *</span>}</label>
      <input id={"df-"+k} ref={k==="first"?firstRef:null} type={type} value={f[k]} onChange={e=>set(k,e.target.value)}
        placeholder={ph} aria-required={!!req} aria-invalid={!!err[k]} aria-describedby={err[k]?"e-"+k:undefined}
        className={cx("w-full rounded-xl border bg-white px-3.5 py-2.5 text-[14px] outline-none transition focus:ring-4 focus:ring-indigo-50",
          err[k]?"border-rose-300 focus:border-rose-400":"border-line focus:border-indigo-300")}/>
      {err[k] && <div id={"e-"+k} className="text-[11px] font-semibold text-rose-600 mt-1">{err[k]}</div>}
    </div>);

}

function App() {
  const [stage,setStage]=useState("landing");  // landing | welcome | app
  const [entered,setEntered]=useState(false);
  const [histState,setHistState]=useState({stack:["ask"], i:0});
  const nav=histState.stack[histState.i];
  const [uploaded,setUploaded]=useState(false);
  const [synthDone,setSynthDone]=useState(false);
  const [published,setPublished]=useState(false);
  const [mlrApproved,setMlrApproved]=useState(false);
  const [reviewOpen,setReviewOpen]=useState(false);
  const [brainTab,setBrainTab]=useState("graph");
  const [source,setSource]=useState(null);       // citation id or null
  const [audit,setAudit]=useState([]);
  const [toastMsg,setToastMsg]=useState(null);
  const toastTimer=useRef(null);

  const toast=useCallback((msg)=>{ setToastMsg(msg); clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToastMsg(null),3200); },[]);
  const scrollTop=()=>{ const el=document.getElementById("scrollmain"); if(el) el.scrollTop=0; };
  const go=useCallback((id)=>{ setHistState(({stack,i})=>{
      if(stack[i]===id) return {stack,i};                    // already here — no-op
      const base=stack.slice(0,i+1);                          // drop any forward history
      return { stack:[...base,id], i:base.length };
    }); scrollTop(); },[]);
  const back=useCallback(()=>{ setHistState(({stack,i})=>({stack,i:Math.max(0,i-1)})); scrollTop(); },[]);
  const forward=useCallback(()=>{ setHistState(({stack,i})=>({stack,i:Math.min(stack.length-1,i+1)})); scrollTop(); },[]);
  const log=useCallback((action, evidence, conf, status, tone, user, role)=>{
    setAudit(a=>[{ ts:"Just now", user:user||BRAND.owner, role:role||BRAND.role, action, evidence:evidence||[], conf, status, tone },...a]); },[]);

  const app={ nav, go, back, forward, canBack:histState.i>0, canForward:histState.i<histState.stack.length-1,
              uploaded, setUploaded, synthDone, setSynthDone, published,
              mlrApproved, setMlrApproved, brainTab, setBrainTab, audit, log,
              openReview:()=>setReviewOpen(true), toast };
  const srcApi={ open:(id)=>setSource(id), close:()=>setSource(null) };

  const approve=()=>{ setPublished(true); setReviewOpen(false);
    toast("Published to the Brand Brain · logged as "+BRAND.owner);
    log("Approved & published “Switching Drivers — What We Know” v12 — 2 findings added, driver contradiction preserved, graph +2 nodes", ["c1","c4","c5"], "high", "Published", "emerald");
    setBrainTab("graph"); go("brand"); };
  const reject=()=>{ setReviewOpen(false); toast("Draft rejected — kept for audit, never deleted");
    log("Rejected today's synthesis draft — retained in the audit archive", [], null, "Rejected", "rose"); };

  const Screen={ ask:AskScreen, pulse:PulseScreen, library:LibraryScreen, brand:BrandBrainScreen,
                 personas:PersonasScreen, mlr:MLRScreen, audit:AuditScreen }[nav];

  if(stage==="landing") return <LandingPage onLaunch={()=>setStage("welcome")}/>;
  if(stage==="welcome") return <WelcomeScreen onEnter={()=>{ setStage("app"); setEntered(true); toast("YI Combo loaded · 9 sources · governed · ready"); }}/>;

  return <SourceCtx.Provider value={srcApi}>
    <div className="flex h-screen bg-canvas">
      <Sidebar app={app}/>
      <main id="scrollmain" className="flex-1 overflow-y-auto">
        <TopBar app={app}/>
        <div className="px-8 py-8 min-h-full"><Screen app={app}/></div>
      </main>
    </div>
    {source && <SourcePanel cite={CITATIONS[source]} onClose={srcApi.close}/>}
    {reviewOpen && <ReviewModal onApprove={approve} onReject={reject} onClose={()=>setReviewOpen(false)}/>}
    <ChatDock app={app}/>
    <Toast message={toastMsg}/>
  </SourceCtx.Provider>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
