/* ------------------------------------------------------------------ TRUST DESIGN TOKENS */
// The four layers are the heart of the trust system. Each is visually distinct.
const LAYER = {
  FACT:          { label:"Fact",          desc:"What a source states",            fg:"text-indigo-700", bg:"bg-indigo-50",  ring:"ring-indigo-100",  bar:"bg-indigo-500" },
  INSIGHT:       { label:"Insight",       desc:"A pattern across sources",         fg:"text-emerald-700",bg:"bg-emerald-50", ring:"ring-emerald-100", bar:"bg-emerald-600" },
  INTERPRETATION:{ label:"Interpretation",desc:"What it may mean",                 fg:"text-amber-700",  bg:"bg-amber-50",   ring:"ring-amber-100",   bar:"bg-amber-500" },
  RECOMMENDATION:{ label:"Recommendation",desc:"What the AI advises — you decide", fg:"text-ink",        bg:"bg-slate-100",  ring:"ring-slate-200",   bar:"bg-slate-800" },
};
const CONF = {
  high:     { label:"High confidence",     dots:3, fg:"text-emerald-700", bg:"bg-emerald-50", dot:"bg-emerald-600" },
  moderate: { label:"Moderate confidence", dots:2, fg:"text-amber-700",   bg:"bg-amber-50",   dot:"bg-amber-500" },
  low:      { label:"Low confidence",      dots:1, fg:"text-rose-600",    bg:"bg-rose-50",    dot:"bg-rose-600" },
};
const cx = (...a) => a.filter(Boolean).join(" ");

/* Source panel context — any citation, anywhere, opens the same slide-over. */
const SourceCtx = createContext(null);
const useSource = () => useContext(SourceCtx);

/* ------------------------------------------------------------------ PRIMITIVES */
function Button({children, onClick, variant="primary", size="md", icon, iconRight, disabled, className}) {
  const base="inline-flex items-center gap-2 font-semibold rounded-xl transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed whitespace-nowrap";
  const sizes={ sm:"text-[13px] px-3 py-1.5", md:"text-sm px-4 py-2.5", lg:"text-[15px] px-5 py-3" };
  const variants={
    primary:"bg-indigo-600 text-white shadow-card hover:bg-indigo-700 hover:shadow-lift active:translate-y-px",
    soft:"bg-indigo-50 text-indigo-700 hover:bg-indigo-100",
    ghost:"text-ink-soft hover:bg-slate-100",
    outline:"border border-line text-ink-soft bg-white hover:bg-slate-50 hover:border-slate-300",
    emerald:"bg-emerald-600 text-white shadow-card hover:bg-emerald-700 hover:shadow-lift active:translate-y-px",
    danger:"border border-rose-200 text-rose-600 bg-white hover:bg-rose-50",
  };
  return <button onClick={onClick} disabled={disabled} className={cx(base,sizes[size],variants[variant],className)}>
    {icon && <span className="-ml-0.5">{icon}</span>}{children}{iconRight && <span className="-mr-0.5">{iconRight}</span>}
  </button>;
}

function LayerBadge({layer, size="sm"}) {
  const L=LAYER[layer]; if(!L) return null;
  return <span className={cx("inline-flex items-center gap-1.5 rounded-md font-bold tracking-wide uppercase ring-1",
    L.fg, L.bg, L.ring, size==="xs"?"text-[9.5px] px-1.5 py-0.5":"text-[10px] px-2 py-0.5")}>
    <span className={cx("w-1.5 h-1.5 rounded-full", L.bar)}></span>{L.label}
  </span>;
}

// Confidence is never a magic number. Hover/click reveals exactly what earned the score.
function ConfidenceBadge({level, why, align="left"}) {
  const C=CONF[level]; const [open,setOpen]=useState(false);
  const points = why && why.points ? why.points : null;
  const legacy = typeof why === "string" ? why : null;
  return <span className="relative inline-flex" onMouseEnter={()=>setOpen(true)} onMouseLeave={()=>setOpen(false)}>
    <button onClick={()=>setOpen(o=>!o)}
      className={cx("inline-flex items-center gap-1.5 rounded-full px-2.5 py-1 text-[11px] font-bold transition", C.fg, C.bg)}>
      <span className="flex gap-0.5">{[0,1,2].map(i=><span key={i} className={cx("w-1.5 h-1.5 rounded-full", i<C.dots?C.dot:"bg-slate-300")}/>)}</span>
      {C.label}
    </button>
    {open && (points||legacy) && <div className={cx("absolute z-40 bottom-full mb-2 w-[300px] rounded-2xl bg-ink text-white shadow-pop animate-fadein overflow-hidden", align==="right"?"right-0":"left-0")}>
      <div className="px-4 pt-3.5 pb-2.5 flex items-center gap-2 border-b border-white/10">
        <span className="flex gap-0.5">{[0,1,2].map(i=><span key={i} className={cx("w-2 h-2 rounded-full", i<C.dots?C.dot:"bg-white/20")}/>)}</span>
        <span className="font-bold text-[13px]">{C.label}</span>
      </div>
      {points ? <div className="px-4 py-3">
        <div className="text-[9.5px] font-bold uppercase tracking-wider text-white/45 mb-2">
          {level==="low"?"Based on":"Supported by"}</div>
        <div className="space-y-1.5">
          {points.map((p,i)=><div key={i} className="flex items-start gap-2 text-[12.5px] leading-snug">
            <span className={cx("mt-0.5 shrink-0", p.ok?"text-emerald-400":"text-amber-400")}>
              {p.ok? <Icon.check size={13}/> : <Icon.gap size={13}/>}</span>
            <span className={p.ok?"text-white/90":"text-white/60"}>{p.text}</span>
          </div>)}
        </div>
      </div> : <div className="px-4 py-3 text-[12.5px] leading-relaxed text-white/85">{legacy}</div>}
      <div className={cx("absolute -bottom-1 w-2.5 h-2.5 bg-ink rotate-45", align==="right"?"right-6":"left-6")}/>
    </div>}
  </span>;
}

function CitationChip({id}) {
  const c=CITATIONS[id]; const src=useSource(); if(!c) return null;
  return <button onClick={()=>src.open(id)}
    className="group inline-flex items-center gap-1 align-middle rounded-md bg-white border border-line px-1.5 py-0.5 text-[11px] font-semibold text-ink-mute hover:text-indigo-700 hover:border-indigo-200 hover:bg-indigo-50 transition">
    <span className="text-indigo-500 group-hover:text-indigo-700"><Icon.quote size={11}/></span>{c.label}
  </button>;
}
function Cites({ids}) { return <span className="inline-flex flex-wrap gap-1 items-center align-middle">{ids.map(id=><CitationChip key={id} id={id}/>)}</span>; }

function Card({children, className, pad="p-5"}) {
  return <div className={cx("bg-white rounded-2xl border border-line shadow-card", pad, className)}>{children}</div>;
}
function Tag({children, tone="slate"}) {
  const t={ slate:"bg-slate-100 text-ink-soft", indigo:"bg-indigo-50 text-indigo-700", emerald:"bg-emerald-50 text-emerald-700",
            amber:"bg-amber-50 text-amber-700", rose:"bg-rose-50 text-rose-600" }[tone];
  return <span className={cx("inline-flex items-center gap-1 rounded-md px-2 py-0.5 text-[11px] font-semibold", t)}>{children}</span>;
}

/* The global source slide-over: the trust primitive. */
function SourcePanel({cite, onClose}) {
  return <div className="fixed inset-0 z-50">
    <div className="absolute inset-0 bg-ink/25 backdrop-blur-[2px] animate-fadein" onClick={onClose}/>
    <div className="absolute right-0 top-0 h-full w-full max-w-md bg-white shadow-pop animate-slidein flex flex-col">
      <div className="px-6 py-5 border-b border-line flex items-start gap-3">
        <div className="mt-0.5 text-indigo-600"><Icon.doc size={20}/></div>
        <div className="flex-1 min-w-0">
          <div className="text-[10px] font-bold uppercase tracking-wider text-ink-faint">Original source · verify</div>
          <div className="font-bold text-[15px] leading-snug mt-0.5">{cite.doc}</div>
          <div className="text-[12px] text-ink-mute mt-0.5 flex items-center gap-1.5">
            <Tag tone={cite.kind==="quant"?"indigo":"emerald"}>{cite.kind==="quant"?"Quantitative":"Qualitative"}</Tag>· {cite.loc}
          </div>
        </div>
        <button onClick={onClose} className="text-ink-mute hover:text-ink hover:bg-slate-100 rounded-lg p-1.5"><Icon.x size={18}/></button>
      </div>
      <div className="flex-1 overflow-y-auto p-6">
        <div className="text-[10px] font-bold uppercase tracking-wider text-ink-faint mb-2">Cited passage</div>
        <div className="relative rounded-xl border border-indigo-100 bg-indigo-50/50 p-4">
          <div className="absolute -left-px top-4 bottom-4 w-1 rounded-full bg-indigo-500"/>
          <p className="text-[15px] leading-relaxed text-ink pl-3">{cite.snippet}</p>
        </div>
        <div className="mt-3 text-[12px] text-ink-mute flex items-center gap-2"><Icon.shield size={14} cls="text-emerald-600"/>{cite.meta}</div>
        {/* Mock document render */}
        <div className="mt-6 text-[10px] font-bold uppercase tracking-wider text-ink-faint mb-2">In context · {cite.loc}</div>
        <div className="rounded-xl border border-line overflow-hidden">
          <div className="bg-slate-50 border-b border-line px-4 py-2 text-[11px] font-semibold text-ink-mute flex items-center justify-between">
            <span>{cite.doc}</span><span>{cite.loc}</span></div>
          <div className="p-4 space-y-2">
            {[0,1,2].map(i=><div key={i} className="h-2.5 rounded bg-slate-100" style={{width:`${[92,78,85][i]}%`}}/>)}
            <div className="h-2.5 rounded bg-indigo-200" style={{width:"96%"}}/>
            <div className="h-2.5 rounded bg-indigo-200" style={{width:"64%"}}/>
            {[0,1].map(i=><div key={i} className="h-2.5 rounded bg-slate-100" style={{width:`${[88,71][i]}%`}}/>)}
          </div>
        </div>
      </div>
      <div className="px-6 py-4 border-t border-line bg-slate-50/60 text-[12px] text-ink-mute flex items-center gap-2">
        <Icon.shield size={14} cls="text-emerald-600"/> Every claim in BrandBrain links to a passage like this.
      </div>
    </div>
  </div>;
}

/* A single trust-formatted statement: layer + text + confidence(why) + citations. Reused everywhere. */
function TrustLine({layer, text, confidence, why, cites, className}) {
  const L=LAYER[layer];
  return <div className={cx("relative rounded-xl border border-line bg-white p-4 pl-5", className)}>
    <span className={cx("absolute left-0 top-4 bottom-4 w-1 rounded-full", L?.bar)}/>
    <div className="flex items-center gap-2 flex-wrap mb-2">
      <LayerBadge layer={layer}/>
      {confidence && <ConfidenceBadge level={confidence} why={why}/>}
    </div>
    <p className="text-[15px] leading-relaxed text-ink">{text}</p>
    {cites && cites.length>0 && <div className="mt-2.5"><Cites ids={cites}/></div>}
  </div>;
}

/* ------------------------------------------------------------------ ASK + SYNTHESIZER (HERO) */
function TrendSparkline({series, labels, delta, sig}) {
  const max=Math.max(...series);
  return <div className="flex items-end gap-5">
    <div className="flex items-end gap-3 h-20">
      {series.map((v,i)=><div key={i} className="flex flex-col items-center gap-1.5 justify-end">
        <div className="text-[12px] font-extrabold text-indigo-700">{v}%</div>
        <div className="w-9 rounded-t-md barfill" style={{height:`${v/max*56}px`, background:i===series.length-1?"#4F46E5":"#C7D2FE", animationDelay:`${i*90}ms`}}/>
        <div className="text-[10px] font-semibold text-ink-mute">{labels[i]}</div>
      </div>)}
    </div>
    <div className="flex flex-col gap-1.5 pb-4">
      <span className="inline-flex items-center gap-1 text-emerald-700 bg-emerald-50 rounded-md px-2 py-1 text-[12px] font-bold w-fit"><Icon.trend size={13}/>{delta}</span>
      <span className="text-[11px] font-semibold text-ink-mute">significant · {sig} confidence</span>
    </div>
  </div>;
}

function ContradictionCard({c}) {
  return <div className="rounded-2xl border border-amber-200 bg-gradient-to-b from-amber-50/70 to-white overflow-hidden shadow-card">
    <div className="px-5 pt-4 pb-3 flex items-center gap-2.5 border-b border-amber-100">
      <span className="text-amber-600"><Icon.split size={18}/></span>
      <div><div className="font-bold text-[15px] text-ink">The studies disagree — and it matters</div>
        <div className="text-[12px] text-amber-700 font-semibold">{c.topic}</div></div>
      <div className="ml-auto"><LayerBadge layer={c.layer}/></div>
    </div>
    <div className="grid md:grid-cols-2 divide-y md:divide-y-0 md:divide-x divide-amber-100">
      {[c.a,c.b].map((s,i)=><div key={i} className="p-5">
        <div className={cx("inline-flex items-center gap-1.5 text-[10px] font-extrabold uppercase tracking-wider mb-2 rounded-md px-2 py-0.5",
          s.method==="QUANT"?"text-indigo-700 bg-indigo-50":"text-emerald-700 bg-emerald-50")}>
          <span className={cx("w-1.5 h-1.5 rounded-full", s.method==="QUANT"?"bg-indigo-500":"bg-emerald-600")}/>{s.method}</div>
        <p className="text-[14.5px] leading-relaxed text-ink">{s.claim}</p>
        <div className="mt-2.5 flex items-center gap-2"><span className="text-[11px] text-ink-mute font-medium">{s.source}</span><CitationChip id={s.cite}/></div>
      </div>)}
    </div>
    <div className="px-5 py-4 bg-white/70 border-t border-amber-100">
      <div className="text-[10px] font-bold uppercase tracking-wider text-amber-700 mb-1">Why we don't average this away</div>
      <p className="text-[13.5px] leading-relaxed text-ink-soft">{c.why}</p>
    </div>
  </div>;
}

function SectionHead({n, title, sub, icon}) {
  return <div className="flex items-center gap-3 mb-3">
    <div className="w-7 h-7 rounded-lg bg-slate-100 text-ink-soft grid place-items-center font-bold text-[13px]">{icon||n}</div>
    <div><div className="font-bold text-[16px] tracking-[-.01em]">{title}</div>{sub && <div className="text-[12px] text-ink-mute">{sub}</div>}</div>
  </div>;
}

// Recommendation with a full "Why this recommendation?" reasoning trail. No black boxes.
function RecommendationCard({rec}) {
  const [open,setOpen]=useState(false);
  const e=rec.explain||{};
  const Block=({title, tone, children})=><div>
    <div className={cx("text-[10px] font-bold uppercase tracking-wider mb-1.5", tone||"text-ink-faint")}>{title}</div>{children}</div>;
  return <div className="rounded-2xl border-2 border-slate-200 bg-white shadow-card overflow-hidden">
    <div className="p-6">
      <div className="flex items-center gap-2 mb-3"><LayerBadge layer="RECOMMENDATION"/><ConfidenceBadge level={rec.confidence} why={rec.why}/></div>
      <p className="text-[16px] leading-relaxed text-ink font-medium">{rec.text}</p>
      <div className="mt-3"><Cites ids={rec.cites}/></div>
      <button onClick={()=>setOpen(o=>!o)}
        className="mt-4 inline-flex items-center gap-1.5 text-[13px] font-semibold text-indigo-700 hover:text-indigo-800 transition">
        <Icon.shield size={15}/> Why this recommendation?
        <span className={cx("transition-transform", open&&"rotate-90")}><Icon.chevron size={14}/></span>
      </button>
    </div>
    {open && <div className="border-t border-line bg-slate-50/60 p-6 space-y-5 animate-fadein">
      <Block title="Reasoning chain">
        <ol className="space-y-2">{e.reasoning?.map((r,i)=><li key={i} className="flex gap-2.5 text-[13.5px] leading-relaxed text-ink-soft">
          <span className="shrink-0 w-5 h-5 rounded-full bg-indigo-100 text-indigo-700 grid place-items-center text-[11px] font-bold">{i+1}</span>{r}</li>)}</ol>
      </Block>
      <Block title="Supporting evidence">
        <div className="space-y-1.5">{e.evidence?.map((ev,i)=><div key={i} className="flex items-start gap-2 text-[13.5px] text-ink-soft">
          <span className="text-emerald-600 mt-0.5 shrink-0"><Icon.check size={14}/></span>
          <span>{ev.text} <span className="inline-flex ml-1 align-middle"><Cites ids={ev.cites}/></span></span></div>)}</div>
      </Block>
      <div className="grid sm:grid-cols-2 gap-5">
        <Block title="Supporting studies">
          <div className="space-y-1">{e.studies?.map((s,i)=><div key={i} className="flex items-center gap-2 text-[13px] text-ink-soft"><span className="text-ink-faint"><Icon.doc size={13}/></span>{s}</div>)}</div>
        </Block>
        <Block title="Contradictory findings" tone="text-amber-700">
          <div className="space-y-1.5">{e.contradictions?.map((c,i)=><div key={i} className="flex items-start gap-2 text-[13px] text-ink-soft"><span className="text-amber-600 mt-0.5 shrink-0"><Icon.split size={13}/></span>{c}</div>)}</div>
        </Block>
      </div>
      <Block title="Alternatives considered">
        <div className="space-y-1.5">{e.alternatives?.map((a,i)=><div key={i} className="flex items-start gap-2 text-[13px] text-ink-soft"><span className="text-ink-faint mt-0.5 shrink-0"><Icon.gap size={13}/></span>{a}</div>)}</div>
      </Block>
    </div>}
  </div>;
}

// Suggested follow-ups. Clicking appends a concise, cited answer — a conversation, not a search.
function FollowUps({items}) {
  const [opened,setOpened]=useState([]);
  const toggle=(id)=>setOpened(o=>o.includes(id)?o.filter(x=>x!==id):[...o,id]);
  return <div>
    <div className="flex flex-wrap gap-2">
      {items.map(f=>{ const on=opened.includes(f.id);
        return <button key={f.id} onClick={()=>toggle(f.id)}
          className={cx("inline-flex items-center gap-1.5 rounded-full border px-3.5 py-2 text-[13px] font-medium transition",
            on?"border-indigo-300 bg-indigo-50 text-indigo-700":"border-line bg-white text-ink-soft hover:border-indigo-200 hover:bg-indigo-50/40")}>
          <span className={on?"text-indigo-600":"text-ink-faint"}>{on? <Icon.check size={14}/> : <Icon.arrow size={14}/>}</span>{f.q}</button>;})}
    </div>
    <div className="mt-3 space-y-2.5">
      {items.filter(f=>opened.includes(f.id)).map(f=><div key={f.id} className="rounded-xl border border-line bg-white p-4 animate-fadeup">
        <div className="text-[13px] font-semibold text-ink-mute mb-2 flex items-center gap-1.5"><Icon.ask size={14} cls="text-indigo-500"/>{f.q}</div>
        <div className="flex items-center gap-2 mb-2"><LayerBadge layer={f.a.layer} size="xs"/></div>
        <p className="text-[14.5px] leading-relaxed text-ink">{f.a.text}</p>
        <div className="mt-2.5"><Cites ids={f.a.cites}/></div>
      </div>)}
    </div>
  </div>;
}

function SynthesisView({data, onApprove, published}) {
  return <div className="max-w-3xl mx-auto pb-40">
    {/* the question, restated calmly */}
    <div className="flex items-start gap-3 mb-6 animate-fadeup">
      <div className="mt-1 w-9 h-9 rounded-xl bg-indigo-600 text-white grid place-items-center shadow-card shrink-0"><Icon.ask size={18}/></div>
      <div><div className="text-[11px] font-bold uppercase tracking-wider text-ink-faint">Your question</div>
        <div className="text-[19px] font-bold tracking-[-.02em] text-ink leading-snug">{data.question}</div></div>
    </div>

    {/* Executive summary — the leadership headline */}
    <div className="relative rounded-2xl border border-indigo-100 bg-gradient-to-br from-indigo-50/80 via-white to-emerald-50/40 p-6 shadow-card animate-fadeup">
      <div className="flex items-center gap-2 mb-3">
        <span className="text-[11px] font-extrabold uppercase tracking-wider text-indigo-700 flex items-center gap-1.5"><Icon.sparkles size={14}/>Executive summary</span>
        <div className="ml-auto flex items-center gap-2"><LayerBadge layer={data.summary.layer}/><ConfidenceBadge level={data.summary.confidence} why={data.summary.why}/></div>
      </div>
      <p className="text-[18px] leading-relaxed font-medium text-ink tracking-[-.01em]">{data.summary.text}</p>
      <div className="mt-4 flex flex-wrap items-center gap-2"><Cites ids={data.summary.cites}/></div>
      <div className="mt-5 pt-5 border-t border-indigo-100/70"><TrendSparkline {...data.summary.trend}/></div>
    </div>

    {/* 1 · Agreements */}
    <div className="mt-8 animate-fadeup">
      <SectionHead n="1" title="What multiple studies agree on" sub="Findings that hold across methods and suppliers"/>
      <div className="space-y-3 stagger">
        {data.agreements.map((a,i)=><TrustLine key={i} {...a} why={a.why}/>)}
      </div>
    </div>

    {/* 2 · Contradiction — the money moment */}
    <div className="mt-8 animate-fadeup">
      <SectionHead n="2" title="Where the evidence disagrees" sub="Preserved, not averaged — this is the decision to make"/>
      <ContradictionCard c={data.contradiction}/>
    </div>

    {/* 3 · Evidence gaps */}
    <div className="mt-8 animate-fadeup">
      <SectionHead n="3" title="What we still don't know" sub="Named honestly, with the study that would close it"/>
      <div className="space-y-3">
        {data.gaps.map((g,i)=><div key={i} className="rounded-xl border border-line bg-white p-4 flex gap-3">
          <span className={cx("mt-0.5 shrink-0", g.severity==="high"?"text-rose-600":"text-amber-600")}><Icon.gap size={18}/></span>
          <div className="flex-1">
            <p className="text-[14.5px] leading-relaxed text-ink">{g.text}</p>
            <div className="mt-2.5 flex items-center gap-2 flex-wrap">
              {g.cites && <Cites ids={g.cites}/>}
              <button className="inline-flex items-center gap-1.5 text-[12px] font-semibold text-indigo-700 bg-indigo-50 hover:bg-indigo-100 rounded-lg px-2.5 py-1 transition"><Icon.plus size={13}/>{g.action}</button>
            </div>
          </div>
        </div>)}
      </div>
    </div>

    {/* 4 · Recommended next action */}
    <div className="mt-8 animate-fadeup">
      <SectionHead n="4" title="Recommended next action" sub="Clearly the AI's advice — you decide"/>
      <RecommendationCard rec={data.recommendation}/>
    </div>

    {/* Suggested follow-ups — an intelligent strategist, not a search box */}
    <div className="mt-8 animate-fadeup">
      <SectionHead title="Keep thinking with it" sub="Where a Brand Director usually goes next" icon={<Icon.sparkles size={15}/>}/>
      <FollowUps items={data.followups}/>
    </div>

    {/* trust footer */}
    <div className="mt-8 flex items-center gap-2 text-[12px] text-ink-mute justify-center">
      <Icon.shield size={14} cls="text-emerald-600"/> AI-drafted from your governed estate · every statement is labeled, scored, and cited · review before sharing.
    </div>

    <PublishBar published={published} onReview={onApprove}/>
  </div>;
}

/* Sticky bar: turn the synthesis into permanent brand memory. */
function PublishBar({published, onReview}) {
  return <div className="fixed bottom-0 left-[248px] right-0 z-30 pointer-events-none">
    <div className="max-w-3xl mx-auto px-6 pb-5">
      <div className="pointer-events-auto rounded-2xl bg-ink text-white shadow-pop px-5 py-3.5 flex items-center gap-4 animate-fadeup">
        {published ? <>
          <span className="w-9 h-9 rounded-xl bg-emerald-500/20 text-emerald-300 grid place-items-center shrink-0"><Icon.checkc size={20}/></span>
          <div className="flex-1"><div className="font-bold text-[14px]">Published to the Brand Brain · v2</div>
            <div className="text-[12px] text-white/60">Now part of what {BRAND.name} knows — readable by every future answer.</div></div>

// Animated number — used for the confidence lift, so the jump is felt, not just read.
function CountUp({from, to, dur=1100, suffix="%"}) {
  const [v,setV]=useState(from); const raf=useRef(null);
  useEffect(()=>{ const t0=performance.now();
    const tick=(t)=>{ const p=Math.min(1,(t-t0)/dur); const eased=1-Math.pow(1-p,3);
      setV(Math.round(from+(to-from)*eased)); if(p<1) raf.current=requestAnimationFrame(tick); };
    raf.current=requestAnimationFrame(tick); return ()=>cancelAnimationFrame(raf.current);
  },[from,to,dur]);
  return <span>{v}{suffix}</span>;
}

        {/* living institutional memory */}
        {isHero && <BrainTimeline published={published}/>}
      </div>
    </div>
  </div>;
}

function AskScreen({app}) {
  const S=app; // phases: 'idle' | 'retrieving' | 'thinking' | 'done'
  const [q,setQ]=useState("");
  const [phase,setPhase]=useState(S.synthDone?"done":"idle");
  const [step,setStep]=useState(0);
  const [foundN,setFoundN]=useState(0);

  useEffect(()=>{ if(S.synthDone) setPhase("done"); },[S.synthDone]);

  const run=useCallback((question)=>{
    setQ(question); setPhase("retrieving"); setStep(0); setFoundN(0);
    // retrieval: count up sources found
    let n=0; const ri=setInterval(()=>{ n++; setFoundN(n); if(n>=SYNTHESIS.sourcesUsed.length) clearInterval(ri); }, 260);
    setTimeout(()=>{ setPhase("thinking");
      let i=0; const ti=setInterval(()=>{ i++; setStep(i); if(i>=SYNTHESIS.thinkSteps.length){ clearInterval(ti);
        setTimeout(()=>{ setPhase("done"); S.setSynthDone(true); }, 520);
      }}, 620);
    }, 1500);
  },[S]);

  // IDLE — calm centered prompt
  if(phase==="idle") return <div className="h-full flex flex-col items-center justify-center px-6 -mt-10">
    <div className="w-full max-w-2xl text-center animate-fadeup">
      <div className="inline-flex items-center gap-2 text-[12px] font-semibold text-ink-mute bg-white border border-line rounded-full px-3 py-1.5 shadow-card mb-6">
        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"/> {DOCUMENTS.length} studies · governed · ready
      </div>
      <h1 className="text-[30px] font-extrabold tracking-[-.03em] text-ink">Ask your brand's memory.</h1>
      <p className="text-[15px] text-ink-mute mt-3 max-w-lg mx-auto leading-relaxed">
        A strategic question, answered from everything your brand has ever learned — with every claim labeled, scored, and traceable to its source.</p>
      <div className="mt-8 relative">
        <div className="flex items-center gap-3 bg-white border border-line rounded-2xl shadow-lift px-4 py-3.5 focus-within:border-indigo-300 focus-within:ring-4 focus-within:ring-indigo-50 transition">
          <span className="text-ink-faint"><Icon.search size={20}/></span>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&q.trim())run(q);}}
            placeholder="Ask a strategic question…" className="flex-1 bg-transparent outline-none text-[16px] text-ink placeholder:text-ink-faint"/>
          <Button size="sm" disabled={!q.trim()} onClick={()=>q.trim()&&run(q)} icon={<Icon.send size={15}/>}>Ask</Button>
        </div>
      </div>
      <div className="mt-6 flex flex-col items-center gap-2">
        <div className="text-[11px] font-semibold uppercase tracking-wider text-ink-faint">Try</div>
        <button onClick={()=>run(HERO_QUESTION)}
          className="group text-left max-w-xl w-full rounded-xl border border-line bg-white hover:border-indigo-200 hover:bg-indigo-50/40 hover:shadow-card px-4 py-3 transition flex items-center gap-3">
          <span className="text-indigo-500 group-hover:text-indigo-700"><Icon.sparkles size={16}/></span>
          <span className="text-[14.5px] font-medium text-ink flex-1">{HERO_QUESTION}</span>
          <span className="text-ink-faint group-hover:text-indigo-600 group-hover:translate-x-0.5 transition"><Icon.arrow size={16}/></span>
        </button>
      </div>
    </div>
  </div>;

  // RETRIEVING + THINKING — "reads before it speaks"
  if(phase==="retrieving"||phase==="thinking") return <div className="max-w-2xl mx-auto pt-10 px-2">
    <div className="flex items-start gap-3 mb-8 animate-fadeup">
      <div className="mt-1 w-9 h-9 rounded-xl bg-indigo-600 text-white grid place-items-center shadow-card shrink-0"><Icon.ask size={18}/></div>
      <div className="text-[19px] font-bold tracking-[-.02em] text-ink leading-snug">{q}</div>
    </div>
    <Card className="animate-fadeup" pad="p-6">
      <div className="flex items-center gap-2.5 mb-5">
        <span className="relative flex h-2.5 w-2.5"><span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-60"/><span className="relative inline-flex rounded-full h-2.5 w-2.5 bg-indigo-600"/></span>
        <span className="font-bold text-[15px]">{phase==="retrieving"?"Retrieving the evidence":"Reasoning across the evidence"}</span>
        <span className="ml-auto text-[12px] text-ink-mute font-medium">reads before it speaks</span>
      </div>
      {/* retrieval sources */}
      <div className="space-y-2 mb-5">
        {SYNTHESIS.sourcesUsed.map((s,i)=><div key={i} className={cx("flex items-center gap-2.5 text-[13.5px] transition-all duration-300",
          i<foundN?"opacity-100 translate-y-0":"opacity-0 translate-y-1")}>
          <span className="text-emerald-600"><Icon.checkc size={16}/></span><span className="text-ink-soft font-medium">{s}</span>
          <span className="ml-auto text-[11px] text-ink-faint">indexed</span>
        </div>)}
      </div>
      {phase==="thinking" && <div className="pt-4 border-t border-line space-y-2.5">
        {SYNTHESIS.thinkSteps.map((t,i)=><div key={i} className={cx("flex items-center gap-3 text-[13.5px] transition-all duration-300",
          i<step?"opacity-100":i===step?"opacity-100":"opacity-30")}>
          <span className="w-4 h-4 shrink-0">{i<step? <span className="text-emerald-600"><Icon.check size={16}/></span>
            : i===step? <span className="block w-3.5 h-3.5 border-2 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"/> : <span className="block w-1.5 h-1.5 rounded-full bg-slate-300 ml-1"/>}</span>
          <span className={cx(i<=step?"text-ink font-medium":"text-ink-faint", i===step&&"caret")}>{t}</span>
        </div>)}
      </div>}
    </Card>
  </div>;

  // DONE
  return <div className="pt-8 px-2"><SynthesisView data={SYNTHESIS} published={S.published}
    onApprove={()=> S.published ? S.go("brand") : S.openReview()}/></div>;
}
/* ------------------------------------------------------------------ SHELL */
const NAV=[
  { id:"ask", label:"Ask", icon:"ask" },
  { id:"pulse", label:"Brand Pulse", icon:"pulse" },
  { id:"library", label:"Library", icon:"library" },
  { id:"brand", label:"Brand Brain", icon:"brain" },
];
const ROADMAP=["Recommendations","MLR review","Audit trail","Settings"];

function Sidebar({app}) {
  return <aside className="w-[248px] shrink-0 h-screen bg-white border-r border-line flex flex-col">
    <div className="px-5 pt-5 pb-4">
      <div className="flex items-center gap-2.5">
        <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-indigo-600 to-indigo-500 grid place-items-center shadow-card text-white"><Icon.brain size={19}/></div>
        <div><div className="font-extrabold text-[15px] tracking-[-.02em] leading-none">BrandBrain</div>
          <div className="text-[10.5px] font-semibold text-ink-faint mt-1 uppercase tracking-wide">Decision Intelligence</div></div>
      </div>
    </div>
    <div className="mx-3 mb-2 rounded-xl bg-slate-50 border border-line px-3 py-2.5 flex items-center gap-2.5">
      <div className="w-7 h-7 rounded-lg bg-indigo-600 text-white grid place-items-center font-extrabold text-[12px]">N</div>
      <div className="min-w-0"><div className="font-bold text-[13px] truncate">{BRAND.name}</div><div className="text-[10.5px] text-ink-mute truncate">{BRAND.tag}</div></div>
      <span className="ml-auto text-ink-faint"><Icon.chevdown size={14}/></span>
    </div>
    <nav className="px-3 mt-1 space-y-0.5">
      {NAV.map(n=>{ const on=app.nav===n.id; const Ico=Icon[n.icon];
        return <button key={n.id} onClick={()=>app.go(n.id)} className={cx("group w-full flex items-center gap-3 px-3 py-2.5 rounded-xl transition text-left relative",
          on?"bg-indigo-50 text-indigo-700":"text-ink-soft hover:bg-slate-50")}>
          {on && <span className="absolute left-0 top-2.5 bottom-2.5 w-1 rounded-r-full bg-indigo-600"/>}
          <span className={on?"text-indigo-600":"text-ink-mute group-hover:text-ink-soft"}><Ico size={19}/></span>
          <span className="font-semibold text-[14px]">{n.label}</span>
          {n.id==="brand" && !app.published && app.synthDone && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-amber-500"/>}
        </button>;})}
    </nav>
    <div className="px-3 mt-6">
      <div className="text-[10px] font-bold uppercase tracking-wider text-ink-faint px-3 mb-1.5">On the roadmap</div>
      {ROADMAP.map(r=><div key={r} className="flex items-center gap-3 px-3 py-2 rounded-xl text-ink-faint cursor-not-allowed">
        <span className="w-[19px] h-[19px] grid place-items-center"><Icon.lock size={14}/></span><span className="text-[13.5px] font-medium">{r}</span>
        <span className="ml-auto text-[9px] font-bold bg-slate-100 text-ink-faint rounded px-1.5 py-0.5">SOON</span></div>)}
    </div>
    <div className="mt-auto p-3 border-t border-line">
      <div className="flex items-center gap-3 px-2 py-1.5">
        <div className="w-9 h-9 rounded-xl bg-gradient-to-br from-slate-700 to-slate-500 text-white grid place-items-center font-bold text-[13px]">AS</div>
        <div className="min-w-0"><div className="font-bold text-[13px] truncate">{BRAND.owner}</div><div className="text-[10.5px] text-ink-mute truncate">{BRAND.role} · {BRAND.name}</div></div>
      </div>
    </div>
  </aside>;
}

function Toast({message}) {
  if(!message) return null;
  return <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[60] animate-fadeup">
    <div className="bg-ink text-white rounded-xl shadow-pop px-4 py-3 flex items-center gap-2.5 text-[13.5px] font-medium">
      <span className="text-emerald-400"><Icon.checkc size={17}/></span>{message}</div>
  </div>;
}

function App() {
  const [nav,setNav]=useState("ask");
  const [uploaded,setUploaded]=useState(false);
  const [synthDone,setSynthDone]=useState(false);
  const [published,setPublished]=useState(false);
  const [reviewOpen,setReviewOpen]=useState(false);
  const [source,setSource]=useState(null);       // citation id or null
  const [toastMsg,setToastMsg]=useState(null);
  const toastTimer=useRef(null);

  const toast=useCallback((msg)=>{ setToastMsg(msg); clearTimeout(toastTimer.current);
    toastTimer.current=setTimeout(()=>setToastMsg(null),3200); },[]);
  const go=useCallback((id)=>{ setNav(id); const el=document.getElementById("scrollmain"); if(el) el.scrollTop=0; },[]);

  const app={ nav, go, uploaded, setUploaded, synthDone, setSynthDone, published,
              openReview:()=>setReviewOpen(true), toast };
  const srcApi={ open:(id)=>setSource(id), close:()=>setSource(null) };

  const approve=()=>{ setPublished(true); setReviewOpen(false); toast("Published to the Brand Brain · logged as Dr. Andrew Smith"); go("brand"); };
  const reject=()=>{ setReviewOpen(false); toast("Draft rejected — kept for audit, never deleted"); };

  const Screen={ ask:AskScreen, pulse:PulseScreen, library:LibraryScreen, brand:BrandBrainScreen }[nav];

  return <SourceCtx.Provider value={srcApi}>
    <div className="flex h-screen bg-canvas">
      <Sidebar app={app}/>
      <main id="scrollmain" className="flex-1 overflow-y-auto">
        <div className="px-8 py-8 min-h-full"><Screen app={app}/></div>
      </main>
    </div>
    {source && <SourcePanel cite={CITATIONS[source]} onClose={srcApi.close}/>}
    {reviewOpen && <ReviewModal onApprove={approve} onReject={reject} onClose={()=>setReviewOpen(false)}/>}
    <Toast message={toastMsg}/>
  </SourceCtx.Provider>;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
